<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
/* Background */
body {
  background: url('https://images.unsplash.com/photo-1554284126-aa88f22d8b74') no-repeat center center/cover;
}

/* Glass effect */
.glass {
  background: rgba(255, 255, 255, 0.12);
  backdrop-filter: blur(14px);
}

/* Animation */
@keyframes fadeSlide {
  from {
    opacity: 0;
    transform: translateY(40px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.animate-login {
  animation: fadeSlide 0.7s ease-out;
}

/* Floating labels */
.input-group {
  position: relative;
}

.input-group input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  outline: none;
  background: rgba(255,255,255,0.9);
}

.input-group label {
  position: absolute;
  left: 12px;
  top: 12px;
  color: gray;
  transition: 0.3s;
  pointer-events: none;
}

.input-group input:focus + label,
.input-group input:not(:placeholder-shown) + label {
  top: -8px;
  font-size: 12px;
  background: white;
  padding: 0 5px;
  border-radius: 5px;
}
</style>

</head>

<body class="flex items-center justify-center h-screen">

<!-- MAIN CONTAINER -->
<div class="flex w-[900px] shadow-2xl rounded-2xl overflow-hidden animate-login">

  <!-- LEFT IMAGE -->
  <div class="w-1/2 hidden md:block">
    <img src="https://images.unsplash.com/photo-1571019613454-1cb2f99b2d8b"
         class="h-full w-full object-cover">
  </div>

  <!-- RIGHT LOGIN -->
  <div class="w-full md:w-1/2 glass p-10 text-white">

    <h2 class="text-3xl font-bold mb-6">Welcome Back 👋</h2>
    <p class="mb-6 text-sm text-gray-200">Login to manage your gym dashboard</p>

    <form method="POST">

      <!-- USERNAME -->
      <div class="input-group mb-5">
        <input type="text" name="username" required placeholder=" ">
        <label>Username</label>
      </div>

      <!-- PASSWORD -->
      <div class="input-group mb-5 relative">
        <input type="password" name="password" id="password" required placeholder=" ">
        <label>Password</label>

        <span onclick="togglePassword()"
          class="absolute right-3 top-3 cursor-pointer text-black">
          👁
        </span>
      </div>

      <!-- ERROR -->
      {% if error %}
      <p class="text-red-300 text-sm mb-3">{{ error }}</p>
      {% endif %}

      <!-- BUTTON -->
      <button
        class="w-full bg-white text-black py-2 rounded-lg font-semibold hover:scale-105 transition">
        Login
      </button>

    </form>

  </div>

</div>

<!-- JS -->
<script>
function togglePassword() {
  const input = document.getElementById("password");
  input.type = input.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
