{% extends "base.html" %}
{% block content %}

<div class="flex justify-center items-center h-[80vh]">

  <form method="POST" 
        class="bg-white dark:bg-gray-800 p-8 rounded-xl shadow w-96 text-black dark:text-white">

    <h2 class="text-2xl font-bold mb-6 text-center">
      Login
    </h2>

    <!-- USERNAME -->
    <label class="block mb-1">Username</label>
    <input name="username" placeholder="Enter username"
      class="w-full px-3 py-2 mb-4 rounded border
      bg-gray-100 dark:bg-gray-700
      text-black dark:text-white
      focus:outline-none focus:ring-2 focus:ring-blue-500">

    <!-- PASSWORD -->
    <label class="block mb-1">Password</label>
    <input name="password" type="password" placeholder="Enter password"
      class="w-full px-3 py-2 mb-6 rounded border
      bg-gray-100 dark:bg-gray-700
      text-black dark:text-white
      focus:outline-none focus:ring-2 focus:ring-blue-500">

    <!-- BUTTON -->
    <button 
      class="bg-blue-500 hover:bg-blue-600 transition text-white px-4 py-2 rounded w-full">
      Login
    </button>

  </form>

</div>

{% endblock %}
