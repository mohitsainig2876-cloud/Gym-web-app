{% extends "base.html" %}
{% block content %}

<h2 class="text-2xl font-bold mb-4">Customers</h2>

<div class="flex justify-between mb-4">
  <input id="searchInput" placeholder="Search..."
    class="border p-2 rounded w-1/3 text-black">

  <button onclick="openAdd()" 
    class="bg-blue-500 text-white px-4 py-2 rounded">
    + Add Customer
  </button>
</div>

<table class="w-full border bg-white text-black">
  <thead>
    <tr class="bg-gray-200">
      <th class="p-2">ID</th>
      <th class="p-2">Name</th>
      <th class="p-2">Phone</th>
      <th class="p-2">Date</th>
      <th class="p-2">Action</th>
    </tr>
  </thead>

  <tbody id="tableBody"></tbody>
</table>

<!-- ================= ADD MODAL ================= -->
<!-- PRO ADD MODAL -->
<div id="addModal" class="hidden fixed inset-0 backdrop-blur-sm bg-black/40 flex items-center justify-center z-50">

  <div class="bg-white dark:bg-gray-800 text-black dark:text-white rounded-2xl shadow-2xl w-96 p-6 transform transition-all scale-95 opacity-0" id="addBox">

    <!-- HEADER -->
    <div class="flex justify-between items-center mb-4">
      <h3 class="text-xl font-semibold">Add Customer</h3>
      <button onclick="closeAdd()" class="text-gray-500 hover:text-red-500 text-xl">&times;</button>
    </div>

    <!-- INPUTS -->
    <input id="addName" placeholder="Name"
    class="border p-2 w-full mb-3 rounded bg-white dark:bg-gray-700 text-black dark:text-white">

    <input id="addPhone" placeholder="Phone"
    class="border p-2 w-full mb-3 rounded bg-white dark:bg-gray-700 text-black dark:text-white">

    <input id="addDate" placeholder="Date"
    class="border p-2 w-full mb-4 rounded bg-white dark:bg-gray-700 text-black dark:text-white">

    <!-- BUTTONS -->
    <div class="flex gap-2">
      <button onclick="addCustomer()" class="bg-green-500 hover:bg-green-600 text-white w-full p-2 rounded transition">
        Save
      </button>
      <button onclick="closeAdd()" class="bg-gray-500 hover:bg-gray-600 text-white w-full p-2 rounded transition">
        Cancel
      </button>
    </div>

  </div>
</div>

<!-- ================= EDIT MODAL ================= -->
<!-- PRO EDIT MODAL -->
<div id="editModal" class="hidden fixed inset-0 backdrop-blur-sm bg-black/40 flex items-center justify-center z-50">

  <div class="bg-white dark:bg-gray-800 text-black dark:text-white rounded-2xl shadow-2xl w-96 p-6 transform transition-all scale-95 opacity-0" id="editBox">

    <div class="flex justify-between items-center mb-4">
      <h3 class="text-xl font-semibold">Edit Customer</h3>
      <button onclick="closeEdit()" class="text-gray-500 hover:text-red-500 text-xl">&times;</button>
    </div>

    <input id="editName" class="border p-2 w-full mb-3 rounded bg-white dark:bg-gray-700 text-black dark:text-white">
    <input id="editPhone" class="border p-2 w-full mb-3 rounded bg-white dark:bg-gray-700 text-black dark:text-white">
    <input id="editDate" class="border p-2 w-full mb-4 rounded bg-white dark:bg-gray-700 text-black dark:text-white">

    <div class="flex gap-2">
      <button onclick="saveEdit()" class="bg-green-500 hover:bg-green-600 text-white w-full p-2 rounded transition">
        Save
      </button>
      <button onclick="closeEdit()" class="bg-gray-500 hover:bg-gray-600 text-white w-full p-2 rounded transition">
        Cancel
      </button>
    </div>

  </div>
</div>

<script>
/* ================= SAFE DATA ================= */
let customers = JSON.parse('{{ customers | tojson | safe }}');
console.log(customers);
let currentId = null;

/* ================= RENDER ================= */
function renderTable(data) {
  const tbody = document.getElementById("tableBody");
  tbody.innerHTML = "";

  data.forEach(c => {
    const row = document.createElement("tr");

    row.innerHTML = `
      <td class="p-2">${c.id}</td>
      <td class="p-2">${c.name}</td>
      <td class="p-2">${c.phone}</td>
      <td class="p-2">${c.date}</td>
      <td class="p-2 space-x-2">
        <button class="bg-yellow-500 text-white px-2 py-1 rounded">Edit</button>
        <button class="bg-red-500 text-white px-2 py-1 rounded">Delete</button>
      </td>
    `;

    // attach events safely
    row.querySelectorAll("button")[0].onclick = () => openEdit(c.id);
    row.querySelectorAll("button")[1].onclick = () => deleteCustomer(c.id);

    tbody.appendChild(row);
  });
}

renderTable(customers);

/* ================= SEARCH ================= */
document.getElementById("searchInput").addEventListener("keyup", function () {
  const val = this.value.toLowerCase();

  const filtered = customers.filter(c =>
    c.name.toLowerCase().includes(val)
  );

  renderTable(filtered);
});

/* ================= ADD ================= */
function openAdd() {
  document.getElementById("addModal").classList.remove("hidden");
}

function closeAdd() {
  document.getElementById("addModal").classList.add("hidden");
}

function addCustomer() {
  const name = document.getElementById("addName").value;
  const phone = document.getElementById("addPhone").value;
  const date = document.getElementById("addDate").value;

  fetch("/add_customer", {
    method: "POST",
    headers: {"Content-Type": "application/x-www-form-urlencoded"},
    body: `name=${encodeURIComponent(name)}&phone=${encodeURIComponent(phone)}&date=${encodeURIComponent(date)}`
  })
  .then(res => res.json())
  .then(c => {
    customers.push(c);
    renderTable(customers);
    closeAdd();
  });
}

/* ================= EDIT ================= */
function openEdit(id) {
  const c = customers.find(x => x.id == id);
  currentId = id;

  document.getElementById("editName").value = c.name;
  document.getElementById("editPhone").value = c.phone;
  document.getElementById("editDate").value = c.date;

  document.getElementById("editModal").classList.remove("hidden");
}

function closeEdit() {
  document.getElementById("editModal").classList.add("hidden");
}

function saveEdit() {
  const name = document.getElementById("editName").value;
  const phone = document.getElementById("editPhone").value;
  const date = document.getElementById("editDate").value;

  fetch(`/edit_customer/${currentId}`, {
    method: "POST",
    headers: {"Content-Type": "application/x-www-form-urlencoded"},
    body: `name=${encodeURIComponent(name)}&phone=${encodeURIComponent(phone)}&date=${encodeURIComponent(date)}`
  })
  .then(() => {
    const c = customers.find(x => x.id == currentId);
    c.name = name;
    c.phone = phone;
    c.date = date;

    renderTable(customers);
    closeEdit();
  });
}

/* ================= DELETE ================= */
function deleteCustomer(id) {
  if (!confirm("Delete?")) return;

  fetch(`/delete_customer/${id}`)
  .then(() => {
    customers = customers.filter(c => c.id != id);
    renderTable(customers);
  });
}
</script>
<script>

/* OPEN ADD */
function openAdd() {
  const modal = document.getElementById("addModal");
  const box = document.getElementById("addBox");

  modal.classList.remove("hidden");

  setTimeout(() => {
    box.classList.remove("scale-95", "opacity-0");
    box.classList.add("scale-100", "opacity-100");
  }, 10);
}

/* CLOSE ADD */
function closeAdd() {
  const modal = document.getElementById("addModal");
  const box = document.getElementById("addBox");

  box.classList.add("scale-95", "opacity-0");

  setTimeout(() => {
    modal.classList.add("hidden");
  }, 200);
}

/* OPEN EDIT */
function openEdit(id) {
  const c = customers.find(x => x.id == id);
  currentId = id;

  editName.value = c.name;
  editPhone.value = c.phone;
  editDate.value = c.date;

  const modal = document.getElementById("editModal");
  const box = document.getElementById("editBox");

  modal.classList.remove("hidden");

  setTimeout(() => {
    box.classList.remove("scale-95", "opacity-0");
    box.classList.add("scale-100", "opacity-100");
  }, 10);
}

/* CLOSE EDIT */
function closeEdit() {
  const modal = document.getElementById("editModal");
  const box = document.getElementById("editBox");

  box.classList.add("scale-95", "opacity-0");

  setTimeout(() => {
    modal.classList.add("hidden");
  }, 200);
}

</script>

{% endblock %}
