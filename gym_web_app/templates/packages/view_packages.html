{% extends "base.html" %}
{% block content %}

<h2 class="text-2xl font-bold mb-4">Packages</h2>

<!-- TOP BAR -->
<div class="flex justify-between mb-4">
  <input id="searchInput" placeholder="Search..."
  class="border p-2 rounded w-1/3 text-black">

  <button onclick="openAdd()" class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">
    + Add Package
  </button>
</div>

<!-- TABLE -->
<table class="w-full bg-white dark:bg-gray-900 text-black dark:text-white rounded shadow">
  <thead class="bg-gray-200 dark:bg-gray-800">
    <tr>
      <th class="p-2">ID</th>
      <th class="p-2">Type</th>
      <th class="p-2">Facilities</th>
      <th class="p-2">Cost</th>
      <th class="p-2">Action</th>
    </tr>
  </thead>

  <tbody id="tableBody"></tbody>
</table>

<!-- ADD MODAL -->
<div id="addModal"
class="hidden fixed inset-0 backdrop-blur-sm bg-black/40 flex justify-center items-center z-50">

  <div class="bg-white dark:bg-gray-800 text-black dark:text-white p-6 rounded-xl w-80 shadow-lg">

    <h3 class="text-lg font-semibold mb-3">Add Package</h3>

    <input id="addType" placeholder="Type"
    class="border p-2 w-full mb-2 rounded text-black dark:text-white bg-white dark:bg-gray-700">

    <input id="addFacilities" placeholder="Facilities"
    class="border p-2 w-full mb-2 rounded text-black dark:text-white bg-white dark:bg-gray-700">

    <input id="addCost" placeholder="Cost"
    class="border p-2 w-full mb-3 rounded text-black dark:text-white bg-white dark:bg-gray-700">

    <div class="flex gap-2">
      <button onclick="addPackage()" class="bg-green-500 text-white w-full p-2 rounded hover:bg-green-600">
        Save
      </button>

      <button onclick="closeAdd()" class="bg-gray-500 text-white w-full p-2 rounded hover:bg-gray-600">
        Cancel
      </button>
    </div>

  </div>
</div>

<script>

/* ================= SAFE DATA LOAD ================= */
let packages = [];

try {
  packages = JSON.parse('{{ packages | tojson | safe }}');
} catch (e) {
  console.error("Data load error:", e);
}

/* ================= RENDER ================= */
function renderTable(data) {
  const tbody = document.getElementById("tableBody");
  tbody.innerHTML = "";

  if (!data || data.length === 0) {
    tbody.innerHTML = `
      <tr>
        <td colspan="5" class="p-4 text-center text-gray-500">
          No packages found
        </td>
      </tr>
    `;
    return;
  }

  data.forEach(p => {
    tbody.innerHTML += `
      <tr class="border hover:bg-gray-100 dark:hover:bg-gray-800">
        <td class="p-2">${p.id}</td>
        <td class="p-2">${p.type}</td>
        <td class="p-2">${p.facilities}</td>
        <td class="p-2">₹ ${p.cost}</td>
        <td class="p-2 space-x-2">
          <button onclick="deletePackage(${p.id})"
          class="bg-red-500 text-white px-2 py-1 rounded hover:bg-red-600">
            Delete
          </button>
        </td>
      </tr>
    `;
  });
}

renderTable(packages);

/* ================= ADD ================= */
function openAdd() {
  document.getElementById("addModal").classList.remove("hidden");
}

function closeAdd() {
  document.getElementById("addModal").classList.add("hidden");
}

function addPackage() {
  const type = document.getElementById("addType").value;
  const facilities = document.getElementById("addFacilities").value;
  const cost = document.getElementById("addCost").value;

  if (!type || !facilities || !cost) {
    alert("Please fill all fields");
    return;
  }

  fetch("/add_package", {
    method: "POST",
    headers: {"Content-Type": "application/x-www-form-urlencoded"},
    body: `type=${encodeURIComponent(type)}&facilities=${encodeURIComponent(facilities)}&cost=${encodeURIComponent(cost)}`
  })
  .then(res => res.json())
  .then(p => {
    packages.push(p);
    renderTable(packages);
    closeAdd();

    // clear inputs
    document.getElementById("addType").value = "";
    document.getElementById("addFacilities").value = "";
    document.getElementById("addCost").value = "";
  });
}

/* ================= DELETE ================= */
function deletePackage(id) {
  if (!confirm("Delete this package?")) return;

  fetch(`/delete_package/${id}`)
  .then(() => {
    packages = packages.filter(p => p.id != id);
    renderTable(packages);
  });
}

/* ================= SEARCH ================= */
document.getElementById("searchInput").addEventListener("keyup", function () {
  const val = this.value.toLowerCase();

  const filtered = packages.filter(p =>
    p.type.toLowerCase().includes(val) ||
    p.facilities.toLowerCase().includes(val)
  );

  renderTable(filtered);
});

</script>

{% endblock %}
