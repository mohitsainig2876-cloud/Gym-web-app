{% extends "base.html" %}
{% block content %}

<h2 class="text-2xl font-bold mb-4">Add Payment</h2>

<div class="bg-white dark:bg-gray-800 p-6 rounded-xl shadow w-96">

  <!-- CUSTOMER DROPDOWN -->
  <label class="block mb-2">Select Customer</label>
  <select id="customerSelect" class="border p-2 w-full mb-3 text-black">
    <option value="">-- Select Customer --</option>
    {% for c in customers %}
      <option value="{{ c.id }}" data-phone="{{ c.phone }}">
        {{ c.name }}
      </option>
    {% endfor %}
  </select>

  <!-- AUTO FILLED PHONE -->
  <input id="phone" placeholder="Phone"
  class="border p-2 w-full mb-3 text-black" readonly>

  <!-- AMOUNT -->
  <input id="amount" placeholder="Amount"
  class="border p-2 w-full mb-3 text-black">

  <!-- DATE -->
  <input id="date" type="date"
  class="border p-2 w-full mb-3 text-black">

  <button onclick="savePayment()"
  class="bg-green-500 text-white w-full p-2 rounded">
    Save Payment
  </button>

</div>

<script>

/* AUTO FILL PHONE */
document.getElementById("customerSelect").addEventListener("change", function () {
  const selected = this.options[this.selectedIndex];
  document.getElementById("phone").value = selected.getAttribute("data-phone") || "";
});

/* SAVE PAYMENT (NO RELOAD) */
function savePayment() {
  const customer_id = document.getElementById("customerSelect").value;
  const amount = document.getElementById("amount").value;
  const date = document.getElementById("date").value;

  if (!customer_id || !amount || !date) {
    alert("Please fill all fields");
    return;
  }

  fetch("/add_payment", {
    method: "POST",
    headers: {"Content-Type": "application/x-www-form-urlencoded"},
    body: `customer_id=${customer_id}&amount=${amount}&date=${date}`
  })
  .then(res => res.json())
  .then(() => {
    showToast("Payment Added ✅");

    // reset form
    document.getElementById("customerSelect").value = "";
    document.getElementById("phone").value = "";
    document.getElementById("amount").value = "";
    document.getElementById("date").value = "";
  });
}

</script>

{% endblock %}
